<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F8F5" />
  <title>마음툭 — 홈 최종 v30</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MaumTalk" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
</head>
<body>
  <main class="app-shell" id="app">
    <section class="screen home-screen" id="homeScreen" aria-label="마음툭 홈">
      <header class="topbar">
        <div class="brand-lockup" aria-label="마음툭">
          <div class="brand-row">
            <span class="brand-word"><span>마음</span><strong>툭</strong></span>
            <svg class="brand-symbol" viewBox="0 0 46 16" aria-hidden="true">
              <path class="brand-line" pathLength="1" d="M3 8 H27" />
              <circle class="brand-symbol-dot" cx="35" cy="8" r="2.7" />
            </svg>
          </div>
          <p class="brand-subtitle">마음이 움직일 때마다, 툭.</p>
        </div>
      </header>

      <p class="today-date" id="todayDate"></p>
      <p class="home-prompt" id="homePrompt">&#50724;&#B298;, &#D230; &#B0A8;&#ACA8;&#BCFC;&#AE4C;&#C694;?</p>

      <section class="category-section" aria-label="마음·생각 조각">
        <p class="category-kicker">마음에 가까운 하나를 골라보세요.</p>
        <div class="fixed-category-grid" id="fixedCategoryGrid" role="listbox" aria-label="마음·생각 조각 선택"></div>
      </section>

      <section class="composer-card" id="composerCard" tabindex="0" role="button" aria-label="선택한 카테고리로 기록 시작">
        <span class="friend composer-card-friend">
          <img id="friendImage" src="../../assets/friend/friend-idle.svg" alt="" />
        </span>
        <div class="composer-main">
          <div class="composer-header">
            <div class="composer-meta">
              <div class="selected-label" id="selectedLabel"></div>
              <span class="selected-hint" id="selectedHint"></span>
            </div>
            <button class="composer-card-cta" id="friendCta" type="button" aria-label="기록하기">
              <span>툭, 기록해볼까?</span>
              <span aria-hidden="true">→</span>
            </button>
          </div>
          <div class="composer-examples" id="composerExamples" aria-live="polite"></div>
        </div>
      </section>

      <section class="recent-section" aria-labelledby="recentTitle">
        <div class="section-head">
          <h2 id="recentTitle">오늘 남긴 툭</h2>
          <button type="button" class="text-button" id="viewAllBtn">모두보기 <span aria-hidden="true">›</span></button>
        </div>
        <div class="recent-list" id="recentList"></div>
      </section>

    </section>

    <nav class="bottom-nav" aria-label="주요 메뉴">
      <button class="nav-item active" type="button"><svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5V21H7v-7h10v7"/></svg><span>오늘</span></button>
      <button class="nav-item" type="button"><svg viewBox="0 0 24 24"><path d="M5 6h14M5 12h14M5 18h14"/></svg><span>툭로그</span></button>
      <button class="nav-item" type="button"><svg viewBox="0 0 24 24"><path d="M4 13c2-5 4 5 7 0s5 5 9-1"/></svg><span>요즘</span></button>
      <button class="nav-item" type="button" id="profileBtn"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4.5 21c.6-4.2 3.1-6.5 7.5-6.5s6.9 2.3 7.5 6.5"/></svg><span>나</span></button>
    </nav>

    <section class="screen editor-screen" id="editorScreen" aria-label="기록 입력" aria-hidden="true">
      <header class="editor-topbar">
        <button type="button" class="editor-action" id="closeEditor" aria-label="닫기"><svg viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18"/></svg></button>
        <button type="button" class="editor-action done" id="saveEditor" aria-label="저장"><svg viewBox="0 0 24 24"><path d="m5 12 4 4L19 6"/></svg></button>
      </header>
      <div class="editor-content">
        <div class="editor-category" id="editorCategory"></div>
        <div class="editor-meta"><strong id="editorDay"></strong><span id="editorTimestamp"></span></div>
        <textarea id="editorText" maxlength="1500" placeholder="지금 떠오른 것을 적어보세요." aria-label="기록 내용"></textarea>
      </div>
      <footer class="editor-toolbar">
        <button type="button">Aa</button>
        <button type="button" aria-label="사진 첨부"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="14" rx="2"/><circle cx="9" cy="10" r="1.5"/><path d="m6 17 4-4 3 3 2-2 3 3"/></svg></button>
        <button type="button" aria-label="음성 기록"><svg viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg></button>
        <span class="char-count" id="charCount">0</span>
      </footer>
    </section>

    <div class="expand-clone" id="expandClone" aria-hidden="true"></div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </main>
  <script src="../../storage.js"></script>
  <script src="../../router.js"></script>
  <script src="script.js"></script>
</body>
</html>
